name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch release refs
        run: |
          git fetch --force origin \
            "+refs/heads/main:refs/remotes/origin/main" \
            "+refs/tags/*:refs/tags/*"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release tag
        run: go run ./tools/releaseguard --tag "$GITHUB_REF_NAME" --base origin/main

      - name: Check existing GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          status="$(curl -sS \
            -o /tmp/release-response.json \
            -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/releases/tags/${TAG_NAME}")"

          case "${status}" in
            200)
              echo "::error::GitHub Release ${TAG_NAME} already exists."
              exit 1
              ;;
            404)
              ;;
            *)
              cat /tmp/release-response.json
              echo "::error::Failed to check GitHub Release ${TAG_NAME}."
              exit 1
              ;;
          esac

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
